<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMR Boys | Logbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0A0A0A;
            color: #FFFFFF;
        }
        /* Custom scrollbar for clean look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #121212;
        }
        ::-webkit-scrollbar-thumb {
            background: #333333;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555555;
        }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-lg bg-[#121212] p-6 border border-[#262626] relative">
        
        <!-- Header -->
        <div class="mb-8 border-b border-[#262626] pb-4 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-tight uppercase">GMR Logbook</h1>
                <p class="text-[10px] text-gray-500 tracking-widest mt-0.5">Logbook system for GMR boys</p>
            </div>
            <div id="syncStatus" class="text-[10px] text-gray-400 bg-[#1A1A1A] px-2 py-1 border border-[#262626]">
                READY
            </div>
        </div>

        <form id="logbookForm" class="space-y-6">
            <!-- 1. Member (4x2 Grid Button) -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Member</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Bex" class="sr-only peer" required>
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Bex</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Abim" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Abim</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Fahry" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Fahry</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Rakha" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Rakha</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Rangga" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Rangga</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Mas Fahrul" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">M. Fahrul</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Raza" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Raza</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="member" value="Ridho" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Ridho</div>
                    </label>
                </div>
            </div>

            <!-- 2. Date -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Date</label>
                <input type="date" name="date" class="w-full p-2.5 bg-[#1A1A1A] border border-[#262626] text-xs text-white focus:outline-none focus:border-white transition-colors" required>
            </div>

            <!-- 3. Type (Multi-select Buttons) -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Type (Multi-select)</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer text-center">
                        <input type="checkbox" name="type" value="Synthesis" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Synthesis</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="checkbox" name="type" value="Data acquisition" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Data Acquisition</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="checkbox" name="type" value="Writing" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Writing</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="checkbox" name="type" value="Other RnD" class="sr-only peer">
                        <div class="p-2.5 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Other RnD</div>
                    </label>
                </div>
            </div>

            <!-- 4. Overview -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Overview</label>
                <textarea name="overview" rows="3" class="w-full p-2.5 bg-[#1A1A1A] border border-[#262626] text-xs text-white placeholder-gray-600 focus:outline-none focus:border-white transition-colors resize-none" placeholder="Isi progres singkat di sini..." required></textarea>
            </div>

            <!-- 5. Status (Selectable Button Grid) -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Status</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="status" value="Done" class="sr-only peer" required>
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Done</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="status" value="Half-done" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Half-Done</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="status" value="Problems!" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Problems!</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="status" value="Abort" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Abort</div>
                    </label>
                </div>
            </div>

            <!-- 6. Difficulty (Selectable Button Grid) -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Difficulty</label>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="difficulty" value="Easy Pizzy" class="sr-only peer" required>
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Easy</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="difficulty" value="Medium" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Medium</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="difficulty" value="Hard" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Hard</div>
                    </label>
                    <label class="cursor-pointer text-center">
                        <input type="radio" name="difficulty" value="Impossible" class="sr-only peer">
                        <div class="p-2 border border-[#262626] text-xs transition-all duration-200 peer-checked:bg-white peer-checked:text-black peer-checked:border-white hover:border-gray-500">Impossible</div>
                    </label>
                </div>
            </div>

            <!-- 7. Output -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Output</label>
                <textarea name="output" rows="3" class="w-full p-2.5 bg-[#1A1A1A] border border-[#262626] text-xs text-white placeholder-gray-600 focus:outline-none focus:border-white transition-colors resize-none" placeholder="Isi hasil/data di sini..." required></textarea>
            </div>

            <!-- 8. Side Note -->
            <div>
                <label class="block mb-2 text-xs font-bold tracking-wider text-gray-400 uppercase">Side Note</label>
                <textarea name="side_note" rows="3" class="w-full p-2.5 bg-[#1A1A1A] border border-[#262626] text-xs text-white placeholder-gray-600 focus:outline-none focus:border-white transition-colors resize-none" placeholder="Catatan opsional..."></textarea>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btnSubmit" class="w-full p-3.5 bg-white text-black font-bold text-xs uppercase tracking-widest hover:bg-gray-200 transition-colors duration-200">
                TRANSMIT DATA
            </button>
        </form>
    </div>

    <script>
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxXp6sSMv1TFeLjGsDKR5fjWM6yCoIevt1L10eHrLpu5Crxc5bv7gRygK7L_OMK0U-Oiw/exec";

        const form = document.getElementById('logbookForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const syncStatus = document.getElementById('syncStatus');

        // Set default date to today
        document.querySelector('input[type="date"]').valueAsDate = new Date();

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            btnSubmit.disabled = true;
            btnSubmit.innerText = "TRANSMITTING...";
            syncStatus.innerText = "SYNCING...";
            syncStatus.className = "text-[10px] text-yellow-400 bg-[#1A1A1A] px-2 py-1 border border-[#262626]";

            const formData = new FormData(form);
            
            // Handle multiple checkboxes for 'type'
            const types = [];
            document.querySelectorAll('input[name="type"]:checked').forEach(cb => {
                types.push(cb.value);
            });
            
            const searchParams = new URLSearchParams();
            for (const pair of formData.entries()) {
                if (pair[0] !== 'type') {
                    searchParams.append(pair[0], pair[1]);
                }
            }
            searchParams.append('type', types.join(', '));

            // Kirim data ke Google Apps Script via AJAX Fetch
            fetch(APPS_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: searchParams
            })
            .then(() => {
                // Skenario Transmit Sukses -> Otomatis bersihkan & refresh form utama
                syncStatus.innerText = "SUCCESS";
                syncStatus.className = "text-[10px] text-green-400 bg-[#1A1A1A] px-2 py-1 border border-[#262626]";
                
                setTimeout(() => {
                    resetFormState();
                }, 800); // Jeda visual singkat 0.8 detik biar user tahu data terkirim
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Transmission failed. Check console.');
                restoreSubmitButton();
            });
        });

        function resetFormState() {
            form.reset();
            // Setel ulang tanggal ke hari ini setelah form dikosongkan
            document.querySelector('input[type="date"]').valueAsDate = new Date();
            restoreSubmitButton();
        }

        function restoreSubmitButton() {
            btnSubmit.disabled = false;
            btnSubmit.innerText = "TRANSMIT DATA";
            syncStatus.innerText = "READY";
            syncStatus.className = "text-[10px] text-gray-400 bg-[#1A1A1A] px-2 py-1 border border-[#262626]";
        }
    </script>
</body>
</html>
